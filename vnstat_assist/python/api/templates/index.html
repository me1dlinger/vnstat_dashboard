<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VNSTAT · DASHBOARD</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <script src="{{ url_for('static', filename='js/apexcharts.js') }}?v=4"></script>
    <script src="{{ url_for('static', filename='js/vue.js') }}?v=4"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}?v=4" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
    </style>
</head>

<body>
    <div id="app">

        <!-- ═══ LOGIN ═══ -->
        <div v-if="!isAuthenticated" class="login-screen">
            <div class="login-box">
                <div class="login-header">
                    <div class="login-title">
                        <div class="dot"></div>
                        VNSTAT
                    </div>
                    <div class="login-subtitle">NETWORK TRAFFIC MONITOR · DASHBOARD</div>
                </div>
                <div class="login-body">
                    <form @submit.prevent="handleLogin">
                        <div class="login-field">
                            <label>[[t('username')]]</label>
                            <input class="login-input" type="text" v-model="loginForm.username" autocomplete="username"
                                required />
                        </div>
                        <div class="login-field">
                            <label>[[t('password')]]</label>
                            <input class="login-input" type="password" v-model="loginForm.password"
                                autocomplete="current-password" required />
                        </div>
                        <button class="login-submit" type="submit" :disabled="loggingIn">
                            [[ loggingIn ? language[currentLang]['loginIn'] : language[currentLang]['login'] ]]
                        </button>
                        <div v-if="loginError" class="login-error">[[ loginError ]]</div>
                    </form>
                </div>
            </div>
        </div>

        <!-- ═══ DASHBOARD ═══ -->
        <template v-else>
            <!-- Topbar -->
            <div class="topbar">
                <div class="topbar-brand">
                    <div class="dot"></div>
                    VNSTAT
                </div>
                <div class="topbar-actions">
                    <button class="tb-btn" :class="{active: topDataMode}"
                        :title="language[currentLang]['topStatistics']" @click="handleShowTopData()">
                        <i class="fas fa-signal"></i> TOP
                    </button>
                    <button class="tb-btn" :class="{active: interfacesDataMode}"
                        :title="language[currentLang]['StatsByInterface']" @click="handleShowInterfaceData()">
                        <i class="fas fa-network-wired"></i> NIC
                    </button>
                    <div class="tb-sep"></div>
                    <button class="tb-btn" @click="toggleLanguage">
                        <i class="fas fa-language"></i> [[ currentLang === 'zh' ? 'EN' : 'ZH' ]]
                    </button>
                    <button class="tb-btn" @click="showThemeSettings">
                        <i class="fas fa-palette"></i>
                    </button>
                    <button class="tb-btn" @click="showApiSettings">
                        <i class="fas fa-cog"></i>
                    </button>
                    <button class="tb-btn" @click="toggleNightMode()">
                        <i :class="isNightMode ? 'fas fa-sun' : 'fas fa-moon'"></i>
                    </button>
                </div>
            </div>

            <!-- Main -->
            <div class="main">

                <!-- ── Stat Cards ── -->
                <div class="stat-grid" v-if="currentInterface">
                    <!-- Total -->
                    <div class="stat-card">
                        <div class="stat-label">[[t('total')]]</div>
                        <div class="stat-total">
                            [[ formatBytes(currentInterface.traffic.total.rx + currentInterface.traffic.total.tx).value
                            ]]
                            <span class="unit">[[ formatBytes(currentInterface.traffic.total.rx +
                                currentInterface.traffic.total.tx).unit ]]</span>
                        </div>
                        <div class="stat-rows">
                            <div class="stat-row">
                                <span class="lbl dot-down"><i class="fas fa-arrow-down"></i></span>
                                <span class="val">[[ formatBytes(currentInterface.traffic.total.rx).value ]]<span
                                        class="u"> [[ formatBytes(currentInterface.traffic.total.rx).unit
                                        ]]</span></span>
                            </div>
                            <div class="stat-row">
                                <span class="lbl dot-up"><i class="fas fa-arrow-up"></i></span>
                                <span class="val">[[ formatBytes(currentInterface.traffic.total.tx).value ]]<span
                                        class="u"> [[ formatBytes(currentInterface.traffic.total.tx).unit
                                        ]]</span></span>
                            </div>
                        </div>
                    </div>
                    <!-- Dynamic: month, today, yesterday -->
                    <div class="stat-card" v-for="(data, title) in summaryData" :key="title">
                        <div class="stat-label">[[ title ]]</div>
                        <div class="stat-total">
                            [[ formatBytes(data.rx + data.tx).value ]]
                            <span class="unit">[[ formatBytes(data.rx + data.tx).unit ]]</span>
                        </div>
                        <div class="stat-rows">
                            <div class="stat-row">
                                <span class="lbl dot-down"><i class="fas fa-arrow-down"></i></span>
                                <span class="val">[[ formatBytes(data.rx).value ]]<span class="u"> [[
                                        formatBytes(data.rx).unit ]]</span></span>
                            </div>
                            <div class="stat-row">
                                <span class="lbl dot-up"><i class="fas fa-arrow-up"></i></span>
                                <span class="val">[[ formatBytes(data.tx).value ]]<span class="u"> [[
                                        formatBytes(data.tx).unit ]]</span></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── Control Bar (hidden in special modes) ── -->
                <div class="ctrl-bar" v-show="!(interfacesDataMode || topDataMode)">
                    <!-- Time range type -->
                    <select class="ctrl-select" v-model="timeRangeType">
                        <option value="hour">[[t('byHour')]]</option>
                        <option value="day">[[t('byDay')]]</option>
                        <option value="month">[[t('byMonth')]]</option>
                        <option value="year">[[t('byYear')]]</option>
                    </select>

                    <div class="ctrl-sep"></div>

                    <!-- Time navigation -->
                    <button class="ctrl-btn" @click="adjustTime(-1)"><i class="fas fa-chevron-left"></i></button>
                    <span class="ctrl-date-range">[[ dateRange ]]</span>
                    <button class="ctrl-btn" :style="{visibility: showNextButton ? 'visible' : 'hidden'}"
                        @click="adjustTime(1)">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    <button class="ctrl-btn" :title="language[currentLang]['customTime']" @click="showCustomTimePicker">
                        <i class="fas fa-calendar-alt"></i>
                    </button>

                    <div class="ctrl-spacer"></div>

                    <!-- Interface meta info -->
                    <div class="ctrl-meta" v-if="latestSelectedInterfaceData">
                        <span>[[t('createTime')]]: [[
                            formatTime(latestSelectedInterfaceData.created) ]]</span>
                        <span>[[t('updateTime')]]: [[
                            formatTime(latestSelectedInterfaceData.updated) ]]</span>
                    </div>

                    <div class="ctrl-sep"></div>

                    <!-- Refresh -->
                    <button class="ctrl-btn" :title="language[currentLang]['refresh']"
                        :style="{visibility: showNextButton ? 'hidden' : 'visible'}" @click="loadData(1)">
                        <i class="fas fa-sync-alt"></i>
                    </button>

                    <!-- Interface select -->
                    <select class="ctrl-select" v-model="latestSelectedInterfaceData">
                        <option v-for="iface in latestInterfacesData" :value="iface">[[ iface.name ]]</option>
                    </select>
                </div>

                <!-- ── Chart + Table Section ── -->
                <div v-show="!(interfacesDataMode || topDataMode)">
                    <!-- Traffic summary strip + view switcher -->
                    <div class="traffic-strip">
                        <div class="ts-items-container">
                            <div class="ts-item">
                                <i class="fas fa-arrow-down dot-down"></i>
                                <span class="ts-val">[[ downloadGB ]]</span>
                                <span style="color:var(--text3);font-size:11px;">[[t('download')]]</span>
                            </div>
                            <div class="ts-item">
                                <i class="fas fa-exchange-alt" style="color:var(--accent)"></i>
                                <span class="ts-val">[[ totalGB ]]</span>
                                <span style="color:var(--text3);font-size:11px;">[[t('total')]]</span>
                            </div>
                            <div class="ts-item">
                                <i class="fas fa-arrow-up dot-up"></i>
                                <span class="ts-val">[[ uploadGB ]]</span>
                                <span style="color:var(--text3);font-size:11px;">[[t('upload')]]</span>
                            </div>
                        </div>
                        <div class="ts-spacer"></div>
                        <div class="view-btns">
                            <button class="ctrl-btn" :class="{active: currentView === 'chart'}"
                                @click="currentView='chart'" :title="language[currentLang]['chartView']">
                                <i class="fas fa-chart-area"></i>
                            </button>
                            <button class="ctrl-btn" :class="{active: currentView === 'bar'}" @click="currentView='bar'"
                                :title="language[currentLang]['barView']">
                                <i class="fas fa-chart-bar"></i>
                            </button>
                            <button class="ctrl-btn" :class="{active: currentView === 'table'}"
                                @click="currentView='table'" :title="language[currentLang]['tableView']">
                                <i class="fas fa-table"></i>
                            </button>
                        </div>
                    </div>

                    <div class="chart-wrap">
                        <!-- Chart -->
                        <div v-show="currentView === 'chart' || currentView === 'bar'" id="trafficChart"></div>
                        <!-- Table -->
                        <div v-show="currentView === 'table'" class="data-table-wrap">
                            <div class="empty-state" v-if="!filteredData.length">
                                <span>[[t('noData') || 'No data']]</span>
                            </div>
                            <table v-else>
                                <thead>
                                    <tr>
                                        <th @click="sortTable('timestamp')">
                                            [[t('timeDate')]] <i class="fas" :class="sortIcon('timestamp')"></i>
                                        </th>
                                        <th @click="sortTable('rx')">
                                            [[t('download')]] <i class="fas" :class="sortIcon('rx')"></i>
                                        </th>
                                        <th @click="sortTable('tx')">
                                            [[t('upload')]] <i class="fas" :class="sortIcon('tx')"></i>
                                        </th>
                                        <th @click="sortTable('total')">
                                            [[t('total')]] <i class="fas" :class="sortIcon('total')"></i>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="item in sortedTableData" :key="item.timestamp">
                                        <td>[[ getformatTableTime(item.date, item.time) ]]</td>
                                        <td>[[ formatBytes(item.rx).value ]] [[
                                            formatBytes(item.rx).unit ]]</td>
                                        <td>[[ formatBytes(item.tx).value ]] [[ formatBytes(item.tx).unit
                                            ]]</td>
                                        <td>[[ formatBytes(item.rx + item.tx).value ]] [[ formatBytes(item.rx +
                                            item.tx).unit ]]</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ── Interfaces Mode ── -->
                <div v-if="interfacesDataMode">
                    <div class="section-title">
                        <i class="fas fa-network-wired"></i>
                        [[t('StatsByInterface')]] &mdash; <span>[[ latestInterfacesTableData.length
                            ]] NIC</span>
                    </div>
                    <div class="chart-wrap">
                        <div class="data-table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th @click="sortTable('name')">[[t('interfaceName')]] <i class="fas"
                                                :class="sortIcon('name')"></i></th>
                                        <th @click="sortTable('todayRx')">[[t('todayDownload')]] <i class="fas"
                                                :class="sortIcon('todayRx')"></i></th>
                                        <th @click="sortTable('todayTx')">[[t('todayUpload')]] <i class="fas"
                                                :class="sortIcon('todayTx')"></i></th>
                                        <th @click="sortTable('todayTotal')">[[t('todayTotal')]] <i class="fas"
                                                :class="sortIcon('todayTotal')"></i></th>
                                        <th @click="sortTable('totalRx')">[[t('allDownload')]] <i class="fas"
                                                :class="sortIcon('totalRx')"></i></th>
                                        <th @click="sortTable('totalTx')">[[t('allUpload')]] <i class="fas"
                                                :class="sortIcon('totalTx')"></i></th>
                                        <th @click="sortTable('totalTotal')">[[t('allTotal')]] <i class="fas"
                                                :class="sortIcon('totalTotal')"></i></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="item in sortedInterfaces" :key="item.name">
                                        <td><code style="font-family:var(--mono)">[[ item.name ]]</code>
                                        </td>
                                        <td>[[ formatBytes(item.todayRx).value ]] [[
                                            formatBytes(item.todayRx).unit ]]</td>
                                        <td>[[ formatBytes(item.todayTx).value ]] [[
                                            formatBytes(item.todayTx).unit ]]</td>
                                        <td>[[ formatBytes(item.todayTotal).value ]] [[
                                            formatBytes(item.todayTotal).unit ]]</td>
                                        <td>[[ formatBytes(item.totalRx).value ]] [[
                                            formatBytes(item.totalRx).unit ]]</td>
                                        <td>[[ formatBytes(item.totalTx).value ]] [[
                                            formatBytes(item.totalTx).unit ]]</td>
                                        <td>[[ formatBytes(item.totalTotal).value ]] [[
                                            formatBytes(item.totalTotal).unit ]]</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ── Top Traffic Mode ── -->
                <div v-if="topDataMode">
                    <div class="section-title">
                        <i class="fas fa-signal"></i>
                        [[t('topStatistics')]] &mdash; <span>[[ latestTopData.length ]] days</span>
                    </div>
                    <div class="chart-wrap">
                        <div class="data-table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th @click="sortTable('timestamp')">[[t('date')]] <i class="fas"
                                                :class="sortIcon('timestamp')"></i></th>
                                        <th @click="sortTable('rx')">[[t('download')]] <i class="fas"
                                                :class="sortIcon('rx')"></i></th>
                                        <th @click="sortTable('tx')">[[t('upload')]] <i class="fas"
                                                :class="sortIcon('tx')"></i></th>
                                        <th @click="sortTable('total')">[[t('total')]] <i class="fas"
                                                :class="sortIcon('total')"></i></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="(item, idx) in sortedTopData" :key="item.timestamp">
                                        <td>
                                            <span class="rank-badge" :class="{top3: idx < 3}">[[ idx + 1 ]]</span>
                                        </td>
                                        <td>[[ getXValue(item.date, null, 'day') ]]</td>
                                        <td>[[ formatBytes(item.rx).value ]] [[
                                            formatBytes(item.rx).unit ]]</td>
                                        <td>[[ formatBytes(item.tx).value ]] [[ formatBytes(item.tx).unit
                                            ]]</td>
                                        <td>[[ formatBytes(item.total).value ]] [[ formatBytes(item.total).unit ]]</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div><!-- /main -->
        </template>

        <!-- ═══ MODAL: Theme Settings ═══ -->
        <div class="modal-overlay" v-if="themeSettingsVisible" @click.self="cancelThemeSettings">
            <div class="modal-box">
                <div class="modal-header">
                    <span class="modal-title">[[t('themeSettings')]]</span>
                    <button class="modal-close" @click="cancelThemeSettings"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body">
                    <!-- Preset swatches -->
                    <div class="theme-presets">
                        <div v-for="(t, i) in presetThemes" :key="i" class="theme-preset"
                            :class="{selected: tempTheme.name === t.name}" :style="{background: t.main}"
                            @click="applyPresetTheme(t)">
                            <div :style="{position:'absolute',top:0,right:0,bottom:0,left:'50%',background:t.accent}">
                            </div>
                            <div class="theme-preset-name">[[ t.name ]]</div>
                        </div>
                    </div>
                    <!-- Color pickers -->
                    <div class="color-fields">
                        <div class="color-field">
                            <label>[[t('accent')]]</label>
                            <div class="color-swatch" :style="{background: tempTheme.accent}">
                                <input type="color" v-model="tempTheme.accent" />
                                <div class="color-swatch-preview"><span class="color-hex">[[ tempTheme.accent ]]</span>
                                </div>
                            </div>
                        </div>
                        <div class="color-field">
                            <label>[[t('main')]]</label>
                            <div class="color-swatch" :style="{background: tempTheme.main}">
                                <input type="color" v-model="tempTheme.main" />
                                <div class="color-swatch-preview"><span class="color-hex">[[ tempTheme.main ]]</span>
                                </div>
                            </div>
                        </div>
                        <div class="color-field">
                            <label>[[t('download')]]</label>
                            <div class="color-swatch" :style="{background: tempTheme.download}">
                                <input type="color" v-model="tempTheme.download" />
                                <div class="color-swatch-preview"><span class="color-hex">[[ tempTheme.download
                                        ]]</span></div>
                            </div>
                        </div>
                        <div class="color-field">
                            <label>[[t('upload')]]</label>
                            <div class="color-swatch" :style="{background: tempTheme.upload}">
                                <input type="color" v-model="tempTheme.upload" />
                                <div class="color-swatch-preview"><span class="color-hex">[[ tempTheme.upload ]]</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Preview chart -->
                    <div id="themePreviewChart" style="margin-top:12px;"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-danger" @click="resetDefaultTheme"><i class="fas fa-undo"></i>
                        [[t('restoreDefault')]]</button>
                    <button class="btn btn-ghost" @click="cancelThemeSettings">[[t('cancel')]]</button>
                    <button class="btn btn-primary" @click="saveThemeSettings">[[t('save')]]</button>
                </div>
            </div>
        </div>

        <!-- ═══ MODAL: Settings ═══ -->
        <div class="modal-overlay" v-if="apiSettingsVisible" @click.self="cancelApiSettings">
            <div class="modal-box">
                <div class="modal-header">
                    <span class="modal-title">[[t('apiSettings')]]</span>
                    <button class="modal-close" @click="cancelApiSettings"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body">
                    <div class="field">
                        <label>[[t('defaultInterface')]]</label>
                        <select v-model="defaultInterface">
                            <option v-for="iface in latestInterfacesData" :value="iface.name">[[ iface.name ]]</option>
                        </select>
                    </div>
                    <div class="switch-row">
                        <span class="switch-label">[[t('enableBackup')]]</span>
                        <label class="switch">
                            <input type="checkbox" v-model="enableBackupData" />
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-ghost" @click="cancelApiSettings">[[t('cancel')]]</button>
                    <button class="btn btn-primary" @click="saveApiSettings">[[t('save')]]</button>
                </div>
            </div>
        </div>

        <!-- ═══ MODAL: Custom Time Picker ═══ -->
        <div class="modal-overlay" v-if="customTimePickerVisible" @click.self="cancelCustomTime">
            <div class="modal-box">
                <div class="modal-header">
                    <span class="modal-title">[[t('customTime')]]</span>
                    <button class="modal-close" @click="cancelCustomTime"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body">
                    <div class="field">
                        <label>[[t('timeRangeType')]]</label>
                        <select v-model="customTimeRangeType">
                            <option value="day">[[t('byDay')]]</option>
                            <option value="month">[[t('byMonth')]]</option>
                            <option value="year">[[t('byYear')]]</option>
                        </select>
                    </div>
                    <div class="field" v-if="customTimeRangeType === 'day'">
                        <label>[[t('selectDate')]]</label>
                        <input type="date" v-model="customSelectedDate" />
                    </div>
                    <div class="field" v-if="customTimeRangeType === 'month'">
                        <label>[[t('selectMonth')]]</label>
                        <input type="month" v-model="customSelectedMonth" />
                    </div>
                    <div class="field" v-if="customTimeRangeType === 'year'">
                        <label>[[t('selectYear')]]</label>
                        <input type="number" v-model="customSelectedYear" min="2000" :max="new Date().getFullYear()" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-ghost" @click="cancelCustomTime">[[t('cancel')]]</button>
                    <button class="btn btn-primary" @click="applyCustomTime">[[t('apply')]]</button>
                </div>
            </div>
        </div>

    </div><!-- /#app -->

    <script>
        new Vue({
            delimiters: ["[[", "]]"],
            el: "#app",
            data: {
                isAuthenticated: true,
                loginForm: { username: "", password: "" },
                loggingIn: false,
                loginError: "",
                authToken: null,

                latestRawData: {},
                latestInterfacesTableData: [],
                latestInterfacesData: [],
                latestTopData: [],
                latestSelectedInterfaceData: null,

                chart: null,
                previewChart: null,

                timeRangeType: "day",
                currentRange: new Date(),
                currentStats: {},
                currentView: "chart",

                customTimePickerVisible: false,
                customTimeRangeType: "day",
                customSelectedDate: null,
                customSelectedMonth: null,
                customSelectedYear: null,

                filteredData: [],
                isNightMode: false,
                interfacesDataMode: false,
                topDataMode: false,
                showNextButton: false,

                sortKey: "name",
                sortOrder: "asc",

                defaultInterface: null,
                apiSettingsVisible: false,
                themeSettingsVisible: false,
                assistApi: null,
                url: {},

                enableBackupData: true,
                backupCache: {},
                cacheKeys: [],
                pendingBackups: new Set(),

                sampleUpData: [{ x: "00:00", y: 20 }, { x: "04:00", y: 80 }, { x: "08:00", y: 40 }, { x: "12:00", y: 120 }, { x: "16:00", y: 90 }, { x: "20:00", y: 60 }],
                sampleDownData: [{ x: "00:00", y: 10 }, { x: "04:00", y: 100 }, { x: "08:00", y: 30 }, { x: "12:00", y: 150 }, { x: "16:00", y: 55 }, { x: "20:00", y: 20 }],

                theme: {
                    name: "科技蓝",
                    main: "#0f172a",
                    accent: "#3b82f6",
                    contrast: "#f8fafc",
                    upload: "#93c5fd",
                    download: "#60a5fa",
                },
                presetThemes: [
                    { name: "科技蓝", main: "#0f172a", accent: "#3b82f6", contrast: "#f8fafc", upload: "#93c5fd", download: "#60a5fa" },
                    { name: "活力橙", main: "#1e293b", accent: "#f59e0b", contrast: "#fff7ed", upload: "#fcd34d", download: "#fb923c" },
                    { name: "清新绿", main: "#1c1917", accent: "#10b981", contrast: "#ecfdf5", upload: "#6ee7b7", download: "#34d399" },
                    { name: "幻影紫", main: "#1a1b26", accent: "#9d7cde", contrast: "#f8f5ff", upload: "#b9a4e6", download: "#7f5fd3" },
                    { name: "玫瑰粉", main: "#2d2d2d", accent: "#ff6b6b", contrast: "#fff0f0", upload: "#ff9d9d", download: "#ff5252" },
                ],
                defaultTheme: {
                    name: "科技蓝", main: "#0f172a", accent: "#3b82f6", contrast: "#f8fafc", upload: "#93c5fd", download: "#60a5fa",
                },
                tempTheme: {},
                currentLang: "zh",

                language: {
                    zh: {
                        languageTip: "Switch to English",
                        username: "用户名", password: "密码",
                        login: "登录", loginIn: "登录中...", loginError: "用户名或密码错误",

            computed: {
                uploadGB() {
                    const f = this.formatBytes(this.currentStats.tx);
                    return f.value + ' ' + f.unit;
                },
                downloadGB() {
                    const f = this.formatBytes(this.currentStats.rx);
                    return f.value + ' ' + f.unit;
                },
                totalGB() {
                    const f = this.formatBytes(this.currentStats.total);
                    return f.value + ' ' + f.unit;
                },
                currentInterface() {
                    return this.latestSelectedInterfaceData || this.latestInterfacesData[0];
                },
                summaryData() {
                    const iface = this.latestSelectedInterfaceData || this.latestInterfacesData[0];
                    if (!iface) return {};
                    const L = this.language[this.currentLang];
                    const data = {};
                    data[L.thisMonth] = this.getMonthData(iface);
                    data[L.today] = this.getDayData(iface);
                    data[L.yesterday] = this.getYesterdayData(iface);
                    return data;
                },
                sortedInterfaces() {
                    return [...this.latestInterfacesTableData].sort((a, b) => {
                        const mod = this.sortOrder === 'asc' ? 1 : -1;
                        if (a[this.sortKey] < b[this.sortKey]) return -mod;
                        if (a[this.sortKey] > b[this.sortKey]) return mod;
                        return 0;
                    });
                },
                sortedTableData() {
                    const data = this.filteredData.map(d => ({ ...d, total: d.rx + d.tx }));
                    return data.sort((a, b) => {
                        const mod = this.sortOrder === 'asc' ? 1 : -1;
                        if (a[this.sortKey] < b[this.sortKey]) return -mod;
                        if (a[this.sortKey] > b[this.sortKey]) return mod;
                        return 0;
                    });
                },
                sortedTopData() {
                    return [...this.latestTopData].sort((a, b) => {
                        const mod = this.sortOrder === 'asc' ? 1 : -1;
                        if (a[this.sortKey] < b[this.sortKey]) return -mod;
                        if (a[this.sortKey] > b[this.sortKey]) return mod;
                        return 0;
                    });
                },
                dateRange() {
                    const d = new Date(this.currentRange);
                    const fmt = (date, withDay = true, withTime = false) => {
                        let r = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                        if (withDay) r += `-${String(date.getDate()).padStart(2, '0')}`;
                        if (withTime) r += ` ${String(date.getHours()).padStart(2, '0')}:00`;
                        return r;
                    };
                    switch (this.timeRangeType) {
                        case 'hour': {
                            const s = new Date(d); s.setMinutes(0, 0, 0);
                            const e = new Date(s); e.setHours(s.getHours() + 1);
                            return `${fmt(s, true, true)} – ${fmt(e, true, true)}`;
                        }
                        case 'day': return fmt(d);
                        case 'month': {
                            const s = new Date(d.getFullYear(), d.getMonth(), 1);
                            const e = new Date(d.getFullYear(), d.getMonth() + 1, 0);
                            return `${fmt(s)} – ${fmt(e)}`;
                        }
                        case 'year': return `${d.getFullYear()}`;
                    }
                },
            },

            watch: {
                timeRangeType() { this.showNextButton = false; this.updateChart(); },
                currentView(v) { if (v === 'chart' || v === 'bar') this.$nextTick(() => this.updateChart()); },
                latestSelectedInterfaceData() { this.updateChart(); this.handleLatestTopData(); },
                theme: { deep: true, handler() { this.applyThemeToCss(); this.$nextTick(() => this.updatePreviewColors()); } },
                tempTheme: { deep: true, handler() { this.$nextTick(() => this.updatePreviewColors()); } },
            },

            methods: {
                // ── Helpers ──
                t(key) {
                    return this.language[this.currentLang][key] || key;
                },
                // ── Auth ──
                async handleLogin() {
                    this.assistApi = window.location.href.replace(/\/$/, '');
                    this.buildUrls();
                    this.loggingIn = true;
                    this.loginError = "";
                    try {
                        const res = await fetch(this.url.login, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(this.loginForm),
                        });
                        if (!res.ok) {
                            this.loginError = this.language[this.currentLang]['loginError'];
                        } else {
                            const { token } = await res.json();
                            this.handleAuthSuccess(token);
                        }
                    } catch (e) {
                        this.loginError = e.message;
                    } finally {
                        this.loggingIn = false;
                    }
                },
                buildUrls() {
                    const base = this.assistApi;
                    this.url = {
                        login: base + "/auth/login",
                        verify: base + "/auth/verify",
                        loadJson: base + "/json.cgi",
                        backups: base + "/backups/",
                    };
                },
                handleAuthSuccess(token) {
                    this.authToken = token;
                    localStorage.setItem("jwt_token", token);
                    this.isAuthenticated = true;
                    this.loadData();
                },
                handleLogout() {
                    this.isAuthenticated = false;
                    this.authToken = null;
                    localStorage.removeItem("jwt_token");
                },
                async fetchWithAuth(url) {
                    const res = await fetch(url, {
                        headers: this.authToken ? { Authorization: `Bearer ${this.authToken}` } : {},
                    });
                    if (res.status === 401) this.handleLogout();
                    return res;
                },

                // ── Data Loading ──
                async loadData(showMsg) {
                    try {
                        const res = await this.fetchWithAuth(this.url.loadJson);
                        const data = await res.json();
                        this.latestRawData = data;
                        this.latestInterfacesData = data.interfaces || [];
                        // Select default interface
                        const saved = this.defaultInterface;
                        if (saved) {
                            const found = this.latestInterfacesData.find(i => i.name === saved);
                            this.latestSelectedInterfaceData = found || this.latestInterfacesData[0];
                        } else {
                            this.latestSelectedInterfaceData = this.latestInterfacesData[0];
                        }
                        this.handleLatestInterfacesData();
                        this.handleLatestTopData();
                        this.updateChart();
                        if (showMsg) this.showMessage('refreshed');
                    } catch (e) {
                        this.showMessage('loadError');
                    }
                },

                // ── Formatting ──
                formatBytes(bytes) {
                    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
                    let i = 0; bytes = Number(bytes);
                    while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
                    return { value: bytes.toFixed(2), unit: units[i] };
                },
                formatFromMB(mb) {
                    const units = ['MB', 'GB', 'TB'];
                    let v = Number(mb), i = 0;
                    while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
                    return { value: v.toFixed(2), unit: units[i] };
                },
                formatTime(timeObj) {
                    if (!timeObj?.timestamp) return 'N/A';
                    const d = new Date(timeObj.timestamp * 1000);
                    const pad = n => String(n).padStart(2, '0');
                    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                },

                // ── Traffic Data Helpers ──
                getMonthData(iface) {
                    const y = new Date().getFullYear(), m = new Date().getMonth() + 1;
                    return iface.traffic.month.find(d => d.date.year === y && d.date.month === m) || { rx: 0, tx: 0 };
                },
                getDayData(iface) {
                    const now = new Date();
                    const y = now.getFullYear(), m = now.getMonth() + 1, day = now.getDate();
                    return iface.traffic.day.find(d => d.date.year === y && d.date.month === m && d.date.day === day) || { rx: 0, tx: 0 };
                },
                getYesterdayData(iface) {
                    const y = new Date(); y.setDate(y.getDate() - 1);
                    return iface.traffic.day.find(d => d.date.year === y.getFullYear() && d.date.month === y.getMonth() + 1 && d.date.day === y.getDate()) || { rx: 0, tx: 0 };
                },

                // ── Time Navigation ──
                adjustTime(offset) {
                    const d = new Date(this.currentRange), now = new Date();
                    const orig = { day: d.getDate(), month: d.getMonth() };
                    switch (this.timeRangeType) {
                        case 'hour':
                            d.setTime(d.getTime() + offset * 3600000);
                            this.showNextButton = !(d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate() && d.getHours() === now.getHours());
                            break;
                        case 'day':
                            d.setDate(d.getDate() + offset);
                            this.showNextButton = !this.isSameDay(d, now);
                            break;
                        case 'month':
                            d.setDate(1); d.setMonth(d.getMonth() + offset);
                            const max = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
                            d.setDate(Math.min(orig.day, max));
                            this.showNextButton = !(d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth());
                            break;
                        case 'year':
                            d.setFullYear(d.getFullYear() + offset);
                            this.showNextButton = d.getFullYear() !== now.getFullYear();
                            break;
                    }
                    this.currentRange = d;
                    this.updateChart();
                },
                isSameDay(a, b) {
                    return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
                },

                // ── Custom Time Picker ──
                showCustomTimePicker() {
                    this.customTimePickerVisible = true;
                    const today = new Date();
                    this.customSelectedDate = today.toISOString().split('T')[0];
                    this.customSelectedMonth = today.toISOString().slice(0, 7);
                    this.customSelectedYear = today.getFullYear().toString();
                },
                cancelCustomTime() { this.customTimePickerVisible = false; },
                applyCustomTime() {
                    this.customTimePickerVisible = false;
                    this.showNextButton = false;
                    switch (this.customTimeRangeType) {
                        case 'day': this.timeRangeType = 'day'; this.currentRange = new Date(this.customSelectedDate); break;
                        case 'month': this.timeRangeType = 'month'; this.currentRange = new Date(this.customSelectedMonth + '-01'); break;
                        case 'year': this.timeRangeType = 'year'; this.currentRange = new Date(parseInt(this.customSelectedYear), 0, 1); break;
                    }
                    this.updateChart();
                },

                // ── Settings ──
                showApiSettings() { this.apiSettingsVisible = !this.apiSettingsVisible; },
                cancelApiSettings() { this.apiSettingsVisible = false; },
                saveApiSettings() {
                    this.apiSettingsVisible = false;
                    localStorage.setItem('default_interface', this.defaultInterface);
                    localStorage.setItem('enable_backup', this.enableBackupData);
                    if (!this.enableBackupData) { this.backupCache = {}; this.cacheKeys = []; localStorage.removeItem('backup_data'); }
                    if (this.isAuthenticated) this.loadData();
                    this.showMessage('refreshed');
                },

                // ── Theme ──
                showThemeSettings() {
                    this.themeSettingsVisible = !this.themeSettingsVisible;
                    this.tempTheme = { ...this.theme };
                    this.$nextTick(() => this.initPreviewChart());
                },
                cancelThemeSettings() { this.themeSettingsVisible = false; },
                saveThemeSettings() {
                    this.theme = { ...this.tempTheme };
                    const isPreset = this.presetThemes.some(p =>
                        p.main === this.theme.main && p.accent === this.theme.accent && p.upload === this.theme.upload && p.download === this.theme.download
                    );
                    if (!isPreset) {
                        this.theme.name = '自定义';
                        this.presetThemes = [...this.presetThemes.filter(t => t.name !== '自定义'), { ...this.theme }];
                    }
                    this.applyThemeToCss();
                    localStorage.setItem('themeColors', JSON.stringify(this.theme));
                    if (this.chart) this.updateChart();
                    this.cancelThemeSettings();
                },
                resetDefaultTheme() {
                    this.theme = { ...this.defaultTheme };
                    this.tempTheme = { ...this.defaultTheme };
                    this.applyThemeToCss();
                    localStorage.setItem('themeColors', JSON.stringify(this.theme));
                },
                applyPresetTheme(preset) { this.tempTheme = { ...preset }; },
                applyThemeToCss() {
                    const r = document.documentElement.style;
                    r.setProperty('--accent', this.theme.accent);
                    r.setProperty('--upload', this.theme.upload);
                    r.setProperty('--download', this.theme.download);
                },
                loadThemeColors() {
                    const saved = localStorage.getItem('themeColors');
                    if (saved) {
                        try {
                            const t = JSON.parse(saved);
                            this.theme = t;
                            if (t.name === '自定义') this.presetThemes.push(t);
                        } catch (e) { }
                    }
                    this.applyThemeToCss();
                },

                // ── Language ──
                toggleLanguage() {
                    this.currentLang = this.currentLang === 'zh' ? 'en' : 'zh';
                    localStorage.setItem('current_lang', this.currentLang);
                    this.showMessage('langSwitched');
                    this.updateChart();
                },

                // ── Night Mode ──
                toggleNightMode(force) {
                    if (force === 1) { this.isNightMode = true; }
                    else { this.isNightMode = !this.isNightMode; localStorage.setItem('nightModeOff', !this.isNightMode); }
                    document.documentElement.classList.toggle('night-mode', this.isNightMode);
                    this.showMessage('switchSuccess');
                },
                isLateNight() { const h = new Date().getHours(); return h >= 23 || h < 6; },

                // ── Interface / Top modes ──
                handleShowInterfaceData() {
                    if (this.interfacesDataMode) { this.interfacesDataMode = false; this.updateChart(); }
                    else { this.interfacesDataMode = true; this.topDataMode = false; this.handleLatestInterfacesData(); }
                },
                handleShowTopData() {
                    if (this.topDataMode) { this.topDataMode = false; this.updateChart(); }
                    else { this.topDataMode = true; this.interfacesDataMode = false; this.handleLatestTopData(); }
                },
                handleLatestInterfacesData() {
                    this.latestInterfacesTableData = this.latestInterfacesData.map(item => {
                        const td = this.getDayData(item);
                        return {
                            name: item.name,
                            todayRx: td.rx, todayTx: td.tx, todayTotal: td.rx + td.tx,
                            totalRx: item.traffic.total.rx, totalTx: item.traffic.total.tx,
                            totalTotal: item.traffic.total.rx + item.traffic.total.tx,
                        };
                    });
                },
                handleLatestTopData() {
                    const iface = this.latestSelectedInterfaceData || this.latestInterfacesData[0];
                    if (!iface) return;
                    this.latestTopData = (iface.traffic.top || []).map(item => ({
                        timestamp: item.timestamp,
                        date: item.date,
                        rx: item.rx, tx: item.tx,
                        total: item.rx + item.tx,
                    }));
                },

                // ── Sort ──
                sortTable(key) {
                    if (this.sortKey === key) { this.sortOrder = this.sortOrder === 'asc' ? 'desc' : 'asc'; }
                    else { this.sortKey = key; this.sortOrder = 'desc'; }
                },
                sortIcon(key) {
                    if (this.sortKey !== key) return 'fa-sort';
                    return this.sortOrder === 'asc' ? 'fa-sort-up' : 'fa-sort-down';
                },

                // ── Backup Data ──
                getDateString(date) {
                    return [date.getFullYear(), String(date.getMonth() + 1).padStart(2, '0'), String(date.getDate()).padStart(2, '0')].join('');
                },
                isPastDate(date) {
                    const c = new Date(date); c.setHours(23, 59, 59, 999); return c < new Date();
                },
                async getBackupData(dateStr) {
                    const cachedRaw = localStorage.getItem('backup_data');
                    if (cachedRaw) {
                        try {
                            const parsed = JSON.parse(cachedRaw);
                            this.backupCache = parsed.cache || {};
                            this.cacheKeys = parsed.keys || [];
                            // Prune stale keys (>30 days)
                            const cutoff = Date.now() - 30 * 86400000;
                            this.cacheKeys = this.cacheKeys.filter(k => {
                                const d = new Date(k.slice(0, 4), parseInt(k.slice(4, 6)) - 1, k.slice(6, 8)).getTime();
                                if (d < cutoff) { delete this.backupCache[k]; return false; }
                                return true;
                            });
                            if (this.backupCache[dateStr]) return this.backupCache[dateStr];
                        } catch (e) { this.backupCache = {}; this.cacheKeys = []; }
                    }
                    if (this.pendingBackups.has(dateStr)) return null;
                    this.pendingBackups.add(dateStr);
                    try {
                        const res = await this.fetchWithAuth(`${this.url.backups}${dateStr}`);
                        const data = await res.json();
                        if (data && !data.error) {
                            this.backupCache[dateStr] = data;
                            this.cacheKeys = [...new Set([...this.cacheKeys, dateStr])].sort();
                            const MAX = 10;
                            while (this.cacheKeys.length > MAX) { delete this.backupCache[this.cacheKeys.shift()]; }
                            localStorage.setItem('backup_data', JSON.stringify({ cache: this.backupCache, keys: this.cacheKeys }));
                            return data;
                        }
                        return null;
                    } catch (e) { return null; }
                    finally { this.pendingBackups.delete(dateStr); }
                },
                processBackupData(currentDate, backupData, dataType) {
                    const iface = backupData.interfaces.find(i => i.name === this.latestSelectedInterfaceData.name);
                    const raw = (iface?.traffic?.[dataType]) || [];
                    return this.processData(currentDate, raw, dataType);
                },

                // ── Series Data ──
                async getMergedSeriesData() {
                    const dataType = { hour: 'fiveminute', day: 'hour', month: 'day', year: 'month' }[this.timeRangeType];
                    const currentDate = new Date(this.currentRange);
                    const useBackup = this.enableBackupData && this.isPastDate(currentDate)
                        && (this.timeRangeType === 'hour' || this.timeRangeType === 'day');

                    if (useBackup) {
                        const bd = await this.getBackupData(this.getDateString(currentDate));
                        if (bd) return this.processBackupData(currentDate, bd, dataType);
                    }
                    if (this.latestSelectedInterfaceData?.traffic) {
                        return this.processData(currentDate, this.latestSelectedInterfaceData.traffic[dataType], dataType);
                    }
                    return [];
                },
                processData(currentDate, rawData, dataType) {
                    if (!rawData) { this.filteredData = []; this.currentStats = { rx: 0, tx: 0, total: 0 }; return []; }
                    const ry = currentDate.getFullYear(), rm = currentDate.getMonth() + 1,
                        rd = currentDate.getDate(), rh = currentDate.getHours();
                    let totalRx = 0, totalTx = 0;

                    this.filteredData = rawData.filter(item => {
                        let match = false;
                        const { year, month, day } = item.date;
                        const hour = item.time?.hour ?? 0;
                        switch (this.timeRangeType) {
                            case 'hour': match = year === ry && month === rm && day === rd && hour === rh; break;
                            case 'day': match = year === ry && month === rm && day === rd; break;
                            case 'month': match = year === ry && month === rm; break;
                            case 'year': match = year === ry; break;
                        }
                        if (match) { totalRx += item.rx || 0; totalTx += item.tx || 0; }
                        return match;
                    });
                    this.currentStats = { rx: totalRx, tx: totalTx, total: totalRx + totalTx };

                    const gx = (date, time) => this.getXValue(date, time, dataType);
                    return [
                        this.generateSeries(this.language[this.currentLang]['download'], 'rx', this.theme.download, gx),
                        this.generateSeries(this.language[this.currentLang]['upload'], 'tx', this.theme.upload, gx),
                    ];
                },
                generateSeries(name, field, color, getX) {
                    return {
                        name, color,
                        data: this.filteredData.map(d => ({ x: getX(d.date, d.time), y: d[field] / (1024 * 1024) })),
                    };
                },
                getXValue(date, time, dataKey) {
                    const { year, month, day } = date;
                    const m = String(month).padStart(2, '0'), d2 = String(day).padStart(2, '0');
                    const h = time ? String(time.hour).padStart(2, '0') : '';
                    const min = time ? String(time.minute).padStart(2, '0') : '';
                    switch (dataKey) {
                        case 'fiveminute': return `${h}:${min}`;
                        case 'hour': return `${h}:00`;
                        case 'day': return `${m}-${d2}`;
                        case 'month': return `${year}-${m}`;
                    }
                },
                getformatTableTime(date, time) {
                    const dataType = { hour: 'fiveminute', day: 'hour', month: 'day', year: 'month' }[this.timeRangeType];
                    return this.getXValue(date, time, dataType);
                },
                getXAxisTitle() {
                    return { day: this.language[this.currentLang]['hour'], month: this.language[this.currentLang]['date'], year: this.language[this.currentLang]['month'] }[this.timeRangeType] || '';
                },

                // ── Chart ──
                async updateChart() {
                    const seriesData = await this.getMergedSeriesData();
                    const isDark = this.isNightMode;
                    const textColor = isDark ? '#64748b' : '#94a3b8';
                    const gridColor = isDark ? '#1e2030' : '#f1f5f9';
                    const chartType = this.currentView === 'bar' ? 'bar' : 'area';

                    const options = {
                        chart: {
                            type: chartType, height: 550,
                            toolbar: { show: false },
                            background: 'transparent',
                            fontFamily: "'IBM Plex Mono', monospace",
                            animations: { enabled: true, easing: 'easeinout', speed: 300 },
                        },
                        series: seriesData,
                        fill: {
                            type: chartType === 'area' ? 'gradient' : 'solid',
                            gradient: {
                                shadeIntensity: 0.5, opacityFrom: 0.7, opacityTo: 0.35,
                                stops: [0, 100],
                            },
                            opacity: chartType === 'bar' ? 0.9 : 1,
                        },
                        stroke: { curve: 'smooth', width: chartType === 'area' ? 2 : 0 },
                        markers: { size: chartType === 'area' ? 3 : 0, hover: { size: 5 } },
                        dataLabels: { enabled: false },
                        xaxis: {
                            type: 'category',
                            title: { text: this.getXAxisTitle(), style: { color: textColor, fontFamily: 'IBM Plex Mono', fontSize: '11px', fontWeight: 400 } },
                            labels: { style: { colors: textColor, fontFamily: 'IBM Plex Mono', fontSize: '11px' } },
                            axisBorder: { color: gridColor },
                            axisTicks: { color: gridColor },
                        },
                        yaxis: {
                            title: { text: this.language[this.currentLang]['traffic'] + ' (MB)', style: { color: textColor, fontFamily: 'IBM Plex Mono', fontSize: '11px', fontWeight: 400 } },
                            labels: {
                                style: { colors: textColor, fontFamily: 'IBM Plex Mono', fontSize: '11px' },
                                formatter: v => v % 1 === 0 ? v.toFixed(0) : v.toFixed(2),
                            },
                        },
                        grid: { borderColor: gridColor, strokeDashArray: 4 },
                        tooltip: {
                            theme: isDark ? 'dark' : 'light',
                            style: { fontFamily: 'IBM Plex Mono', fontSize: '11px' },
                            y: { formatter: v => { const f = this.formatFromMB(v); return f.value + ' ' + f.unit; } },
                        },
                        legend: { labels: { colors: textColor } },
                        theme: { mode: isDark ? 'dark' : 'light' },
                    };

                    if (this.chart) {
                        this.chart.updateOptions(options);
                    } else {
                        this.chart = new ApexCharts(document.querySelector('#trafficChart'), options);
                        this.chart.render();
                    }
                },

                // ── Preview chart for theme panel ──
                initPreviewChart() {
                    if (this.previewChart) { try { this.previewChart.destroy(); } catch (e) { } this.previewChart = null; }
                    const el = document.querySelector('#themePreviewChart');
                    if (!el) return;
                    this.previewChart = new ApexCharts(el, {
                        chart: { type: 'area', height: 120, toolbar: { show: false }, background: 'transparent', fontFamily: 'IBM Plex Mono', animations: { enabled: false } },
                        series: [
                            { name: this.language[this.currentLang]['download'], data: this.sampleDownData, color: this.tempTheme.download },
                            { name: this.language[this.currentLang]['upload'], data: this.sampleUpData, color: this.tempTheme.upload },
                        ],
                        fill: { type: 'gradient', gradient: { opacityFrom: 0.3, opacityTo: 0.15 } },
                        stroke: { curve: 'smooth', width: 2 },
                        markers: { size: 0 },
                        dataLabels: { enabled: false },
                        xaxis: { type: 'category', labels: { show: false }, axisBorder: { show: false }, axisTicks: { show: false } },
                        yaxis: { labels: { show: false } },
                        grid: { show: false },
                        legend: { show: false },
                        tooltip: { enabled: false },
                    });
                    this.previewChart.render();
                },
                updatePreviewColors() {
                    if (!this.previewChart) return;
                    this.previewChart.updateOptions({
                        series: [
                            { name: this.language[this.currentLang]['download'], data: this.sampleDownData, color: this.tempTheme.download },
                            { name: this.language[this.currentLang]['upload'], data: this.sampleUpData, color: this.tempTheme.upload },
                        ],
                    });
                },

                // ── Toast ──
                showMessage(msgKey) {
                    const msg = this.language[this.currentLang][msgKey] || msgKey;
                    let container = document.querySelector('.msg-container');
                    if (!container) {
                        container = document.createElement('div');
                        container.className = 'msg-container';
                        document.body.appendChild(container);
                    }
                    const el = document.createElement('div');
                    el.className = 'message';
                    el.textContent = msg;
                    container.appendChild(el);
                    setTimeout(() => el.classList.add('show'), 10);
                    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2800);
                },
            },

            async mounted() {
                // Night mode
                if (this.isLateNight() && !localStorage.getItem('nightModeOff')) {
                    this.isNightMode = true;
                    document.documentElement.classList.add('night-mode');
                    setTimeout(() => this.showMessage('nightMode'), 800);
                }

                // Restore persisted night mode state
                const nightOff = localStorage.getItem('nightModeOff');
                if (nightOff === 'true') {
                    this.isNightMode = false;
                    document.documentElement.classList.remove('night-mode');
                } else if (nightOff === 'false') {
                    this.isNightMode = true;
                    document.documentElement.classList.add('night-mode');
                }

                // Theme
                this.loadThemeColors();

                // Restore prefs
                const lang = localStorage.getItem('current_lang');
                this.currentLang = lang || 'zh';

                const savedEnable = localStorage.getItem('enable_backup');
                this.enableBackupData = savedEnable !== null ? savedEnable === 'true' : true;

                this.defaultInterface = localStorage.getItem('default_interface');

                if (!this.enableBackupData) {
                    this.backupCache = {}; this.cacheKeys = [];
                    localStorage.removeItem('backup_data');
                } else {
                    try {
                        const raw = localStorage.getItem('backup_data');
                        if (raw) { const p = JSON.parse(raw); this.backupCache = p.cache || {}; this.cacheKeys = p.keys || []; }
                    } catch (e) { }
                }

                // Base URL
                this.assistApi = window.location.href.replace(/\/$/, '');
                this.buildUrls();
                const storedToken = localStorage.getItem('jwt_token');
                if (storedToken) {
                    this.authToken = storedToken;
                    const checkRes = await this.fetchWithAuth(this.url.verify);
                    const check = await checkRes.json();
                    if (checkRes.ok && check.valid) { this.handleAuthSuccess(storedToken); }
                    else { this.handleLogout(); }
                } else {
                    this.handleLogout();
                }
            },
        });
    </script>
</body>

</html>
